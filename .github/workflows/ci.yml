name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          CORTEX_CANONICAL_URI: https://mcp.example.com/mcp
          OAUTH_ISSUER: https://auth.example.com
